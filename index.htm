<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
    <style>
        body{
            margin: 0px;
            padding: 0px;
            
        }
        .nav1{
            background-color: rgb(179, 179, 179);
            margin: 0px;
            padding: 0px;
        }
        .listam{
            list-style: none;
            text-align: center;
            margin: 0; /*نکته خیلی مهم همینه*/
        }
        .listam li{
            display: inline-block;
        }
        .listam li a{
            display: inline-block;
            color: black;
            text-decoration: none;
            padding: 20px;
        }
        .listam li a:hover{
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
        }
        .listof{
            list-style-type:none;
            padding: 0px;
            margin: 0px;
        }
        .listof li{
           text-align: center;
        }
        .listof a{
            margin-top: 0px;

            background-color: rgb(0, 0, 0);
            display: block;
            text-decoration: none;
            color: rgb(255, 255, 255);
            width: 100px;
            padding: 20px;
            text-align: center;
        }
        .listof a:hover{
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="nav1">
        <ul class="listam">
            <li><a href="">home</a></li>
            <li><a href="">projects</a></li>
            <li><a href="">about me</a></li>
            <li><a href="">contact me</a></li>
        </ul>
    </div>
    <div class="nav2">
        <ul class="listof">
            <li><a href="">home</a></li>
            <li><a href="">projects</a></li>
            <li><a href="">about me</a></li>
            <li><a href="">color</a></li>
            <li><a href="">age</a></li>
            <li><a href="">contact me</a></li>
        </ul>
    </div>
</body>
</html>
